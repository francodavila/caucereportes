<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cauce — Informe de Gestión 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d;
  --bg2: #0e1018;
  --bg3: #141620;
  --card: rgba(18,20,34,.75);
  --card-hover: rgba(26,30,50,.85);
  --card-border: rgba(255,255,255,.06);
  --glass: rgba(255,255,255,.03);
  --glass-border: rgba(255,255,255,.08);
  --text: #e8e8eb;
  --text2: #9ca3af;
  --text3: #5a6070;
  --green: #34d399;
  --green2: #10b981;
  --green-bg: rgba(52,211,153,.08);
  --green-glow: rgba(52,211,153,.15);
  --red: #f87171;
  --red2: #ef4444;
  --red-bg: rgba(248,113,113,.08);
  --blue: #60a5fa;
  --blue2: #3b82f6;
  --blue-bg: rgba(96,165,250,.08);
  --amber: #fbbf24;
  --amber2: #f59e0b;
  --amber-bg: rgba(251,191,36,.08);
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --accent: #34d399;
  --shadow: 0 8px 32px rgba(0,0,0,.4);
  --shadow-lg: 0 16px 64px rgba(0,0,0,.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* === ANIMATED BACKGROUND === */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 100%);
}
.bg-glow {
  position: fixed; z-index: 0; pointer-events: none;
  width: 600px; height: 600px; border-radius: 50%;
  filter: blur(120px); opacity: .12;
}
.bg-glow.g1 { top: -200px; left: -100px; background: var(--green2); animation: float1 12s ease-in-out infinite alternate; }
.bg-glow.g2 { top: 40%; right: -200px; background: var(--blue2); animation: float2 15s ease-in-out infinite alternate; }
.bg-glow.g3 { bottom: -200px; left: 30%; background: var(--purple); animation: float1 18s ease-in-out infinite alternate-reverse; }
@keyframes float1 { 0%{transform:translate(0,0)} 100%{transform:translate(40px,30px)} }
@keyframes float2 { 0%{transform:translate(0,0)} 100%{transform:translate(-30px,40px)} }

/* === SCROLL ANIMATIONS === */
.reveal {
  opacity: 0; transform: translateY(30px);
  transition: opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: .1s; }
.reveal-delay-2 { transition-delay: .2s; }
.reveal-delay-3 { transition-delay: .3s; }
.reveal-delay-4 { transition-delay: .4s; }

/* === HERO === */
.hero {
  position: relative; overflow: hidden; z-index: 1;
  padding: 80px 0 100px; text-align: center;
  background: linear-gradient(170deg, #08090d 0%, #111528 35%, #0d1a20 70%, #08090d 100%);
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 25% 30%, rgba(52,211,153,.07) 0%, transparent 100%),
    radial-gradient(ellipse 40% 50% at 75% 60%, rgba(96,165,250,.05) 0%, transparent 100%);
}
.hero::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), rgba(96,165,250,.2), transparent);
}
.hero-content { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 0 24px; }
.hero-logo {
  font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700;
  color: #fff; margin-bottom: 12px; letter-spacing: 4px;
  animation: logoIn 1.2s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes logoIn { from{opacity:0;transform:scale(.9) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.hero-sub {
  font-size: .85rem; color: var(--text3); font-weight: 400;
  letter-spacing: 4px; text-transform: uppercase;
  animation: fadeIn .8s .3s both;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.hero-period {
  display: inline-flex; align-items: center; gap: 14px; margin-top: 24px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 100px; padding: 10px 30px; font-size: .85rem; color: var(--text2);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  animation: fadeIn .8s .5s both;
}
.hero-period .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--green-glow); }
.hero-result {
  margin-top: 36px; display: inline-flex; flex-direction: column; align-items: center;
  background: linear-gradient(135deg, rgba(52,211,153,.06), rgba(52,211,153,.02));
  border: 1px solid rgba(52,211,153,.15);
  border-radius: 24px; padding: 28px 48px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(52,211,153,.06), inset 0 1px 0 rgba(255,255,255,.05);
  animation: resultIn 1s .6s both;
}
@keyframes resultIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.hero-result .tag {
  font-size: .65rem; color: var(--green); text-transform: uppercase; letter-spacing: 3px; font-weight: 600;
}
.hero-result .big {
  font-size: 3rem; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #34d399, #6ee7b7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}
.hero-result .vs {
  font-size: .8rem; color: var(--text3); margin-top: 10px;
  padding-top: 10px; border-top: 1px solid rgba(255,255,255,.06);
}
.hero-result .vs .neg { color: var(--red); font-weight: 600; }
.hero-result .vs .pos { color: var(--green); font-weight: 700; }

/* === TAB BAR === */
.tab-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,9,13,.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 12px 0;
  margin-bottom: 20px;
}
.tab-bar-inner {
  max-width: 1220px; margin: 0 auto; padding: 0 28px;
  display: flex; gap: 8px; justify-content: center;
}
.tab-pill {
  padding: 10px 28px; border-radius: 100px;
  font-size: .82rem; font-weight: 600; letter-spacing: .5px;
  color: var(--text3); cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all .3s ease;
}
.tab-pill:hover { color: var(--text2); border-color: rgba(255,255,255,.12); }
.tab-pill.active {
  color: #fff; background: rgba(52,211,153,.12);
  border-color: rgba(52,211,153,.3);
  box-shadow: 0 0 20px rgba(52,211,153,.1);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

.container { max-width: 1220px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }

/* === KPI CARDS === */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-top: 24px; position: relative; z-index: 3;
}
@media(max-width:1000px){ .kpi-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:600px){ .kpi-grid { grid-template-columns: repeat(2,1fr); } }
.kpi-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 20px; padding: 24px 20px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transition: all .4s cubic-bezier(.22,1,.36,1);
  position: relative; overflow: hidden;
}
.kpi-card:hover {
  background: var(--card-hover); transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: rgba(255,255,255,.1);
}
.kpi-card .kpi-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi-card .kpi-glow {
  position: absolute; top: -40px; right: -40px; width: 100px; height: 100px;
  border-radius: 50%; filter: blur(40px); opacity: .08;
}
.kpi-label {
  font-size: .65rem; text-transform: uppercase; letter-spacing: 2px;
  color: var(--text3); font-weight: 500; position: relative;
}
.kpi-value {
  font-size: 1.6rem; font-weight: 800; color: #fff; margin: 8px 0 4px;
  letter-spacing: -.5px; position: relative;
}
.kpi-sub { font-size: .75rem; color: var(--text3); position: relative; }
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .68rem; font-weight: 700; padding: 4px 10px;
  border-radius: 8px; margin-top: 8px; position: relative;
}
.kpi-delta.up { background: var(--green-bg); color: var(--green); }
.kpi-delta.down { background: var(--red-bg); color: var(--red); }
.kpi-delta svg { width: 10px; height: 10px; }

/* === SECTIONS === */
.section { margin-top: 64px; }
.section-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
}
.section-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,.2);
}
.section-title {
  font-family: 'Playfair Display', serif; font-size: 1.5rem;
  font-weight: 700; color: #fff; letter-spacing: -.2px;
}
.section-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--card-border), transparent);
}

/* === CARDS === */
.card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 20px; padding: 28px; margin-bottom: 16px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transition: border-color .3s;
}
.card:hover { border-color: rgba(255,255,255,.1); }
.card-title {
  font-size: .75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text3); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: ''; width: 3px; height: 14px; border-radius: 3px;
  background: var(--accent);
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media(max-width:800px){ .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* === TABLES === */
table { width: 100%; border-collapse: collapse; font-size: .8rem; }
thead th {
  text-align: left; padding: 12px 14px; font-weight: 600; font-size: .68rem;
  text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3);
  border-bottom: 1px solid rgba(255,255,255,.06);
  background: rgba(255,255,255,.01);
}
thead th:not(:first-child) { text-align: right; }
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,.025);
  transition: background .2s;
}
td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
tr:hover td { background: rgba(255,255,255,.02); }
.row-group td {
  font-weight: 700; color: #fff;
  background: rgba(255,255,255,.025) !important;
}
.row-sub td { padding-left: 32px; color: var(--text2); font-size: .78rem; }
.row-total td {
  font-weight: 700; color: #fff;
  border-top: 2px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03) !important;
}
.up { color: var(--green); font-weight: 600; }
.down { color: var(--red); font-weight: 600; }
.neutral { color: var(--text3); }

/* === CHART === */
.chart-box { position: relative; }

/* === INSIGHT CARDS === */
.insight {
  border-radius: 16px; padding: 20px 24px; margin-bottom: 14px;
  border: 1px solid; display: flex; gap: 16px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: transform .3s, box-shadow .3s;
}
.insight:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
.insight .icon {
  font-size: 1.3rem; flex-shrink: 0; margin-top: 1px;
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.insight .title { font-weight: 700; font-size: .88rem; margin-bottom: 5px; }
.insight .desc { font-size: .8rem; line-height: 1.6; }
.insight-green {
  background: linear-gradient(135deg, rgba(52,211,153,.06), rgba(52,211,153,.02));
  border-color: rgba(52,211,153,.12);
}
.insight-green .icon { background: rgba(52,211,153,.1); }
.insight-green .title { color: var(--green); }
.insight-green .desc { color: rgba(52,211,153,.75); }
.insight-amber {
  background: linear-gradient(135deg, rgba(251,191,36,.06), rgba(251,191,36,.02));
  border-color: rgba(251,191,36,.12);
}
.insight-amber .icon { background: rgba(251,191,36,.1); }
.insight-amber .title { color: var(--amber); }
.insight-amber .desc { color: rgba(251,191,36,.75); }
.insight-red {
  background: linear-gradient(135deg, rgba(248,113,113,.06), rgba(248,113,113,.02));
  border-color: rgba(248,113,113,.12);
}
.insight-red .icon { background: rgba(248,113,113,.1); }
.insight-red .title { color: var(--red); }
.insight-red .desc { color: rgba(248,113,113,.75); }
.insight-blue {
  background: linear-gradient(135deg, rgba(96,165,250,.06), rgba(96,165,250,.02));
  border-color: rgba(96,165,250,.12);
}
.insight-blue .icon { background: rgba(96,165,250,.1); }
.insight-blue .title { color: var(--blue); }
.insight-blue .desc { color: rgba(96,165,250,.75); }

/* === MINI STAT === */
.stat-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 18px; }
.mini-stat {
  flex: 1; min-width: 140px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 18px;
  transition: all .3s;
}
.mini-stat:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.12); }
.mini-stat .ms-label { font-size: .65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); font-weight: 500; }
.mini-stat .ms-value { font-size: 1.3rem; font-weight: 800; color: #fff; margin: 5px 0; letter-spacing: -.3px; }
.mini-stat .ms-sub { font-size: .72rem; color: var(--text2); }

/* === GAUGE === */
.gauge-container { display: flex; justify-content: center; align-items: center; gap: 40px; padding: 20px 0; }
.gauge { position: relative; width: 130px; height: 130px; }
.gauge svg { transform: rotate(-90deg); }
.gauge .track { fill: none; stroke: rgba(255,255,255,.04); stroke-width: 10; }
.gauge .fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.5s cubic-bezier(.22,1,.36,1); }
.gauge .center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.gauge .pct { font-size: 1.4rem; font-weight: 900; color: #fff; }
.gauge .lbl { font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

/* === FOOTER === */
.footer-bar {
  margin-top: 80px; padding: 32px 0; position: relative; z-index: 1;
  border-top: 1px solid rgba(255,255,255,.04);
  text-align: center;
}
.footer-bar .f-logo {
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  color: var(--text3); margin-bottom: 6px; letter-spacing: 4px;
}
.footer-bar .f-text { font-size: .72rem; color: var(--text3); }

/* === COUNTER ANIMATION === */
.counter { display: inline-block; }

/* === MOBILE RESPONSIVE === */
@media(max-width:768px){
  .hero { padding: 50px 0 70px; }
  .hero-logo { font-size: 2rem; }
  .hero-result { padding: 20px 28px; border-radius: 18px; }
  .hero-result .big { font-size: 2rem; }
  .hero-result .tag { font-size: .6rem; letter-spacing: 2px; }
  .hero-period { padding: 8px 20px; font-size: .75rem; }
  .container { padding: 0 16px; }
  .section { margin-top: 44px; }
  .section-title { font-size: 1.2rem; }
  .kpi-grid { margin-top: -36px; gap: 10px; grid-template-columns: repeat(3, 1fr); }
  .kpi-card { padding: 16px 14px; border-radius: 14px; }
  .kpi-value { font-size: 1.2rem; }
  .kpi-label { font-size: .6rem; letter-spacing: 1.5px; }
  .kpi-sub { font-size: .68rem; }
  .kpi-delta { font-size: .6rem; padding: 3px 8px; }
  .card { padding: 18px 14px; border-radius: 14px; margin-bottom: 12px; }
  .card-title { font-size: .7rem; margin-bottom: 14px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 12px; }
  .card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 520px; font-size: .72rem; }
  thead th { padding: 8px 10px; font-size: .6rem; letter-spacing: 1px; }
  td { padding: 8px 10px; }
  .row-sub td { padding-left: 22px; font-size: .7rem; }
  .chart-box canvas { max-height: 250px; }
  .gauge-container { flex-direction: column; gap: 20px; align-items: center; }
  .gauge { width: 110px; height: 110px; }
  .gauge .pct { font-size: 1.1rem; }
  .insight { padding: 16px 18px; gap: 12px; }
  .insight .title { font-size: .82rem; }
  .insight .desc { font-size: .75rem; }
  .insight .icon { width: 30px; height: 30px; font-size: 1rem; border-radius: 8px; }
  .stat-row { gap: 10px; }
  .mini-stat { min-width: 100px; padding: 14px 12px; border-radius: 12px; }
  .mini-stat .ms-value { font-size: 1.05rem; }
  .mini-stat .ms-label { font-size: .58rem; }
  .mini-stat .ms-sub { font-size: .65rem; }
  .footer-bar { margin-top: 50px; padding: 24px 0; }
  .bg-glow { width: 300px; height: 300px; filter: blur(80px); opacity: .08; }
  .tab-bar-inner { padding: 0 16px; }
  .tab-pill { padding: 8px 16px; font-size: .75rem; }
}
@media(max-width:400px){
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-card { padding: 14px 12px; }
  .kpi-value { font-size: 1.05rem; }
  .hero-result .big { font-size: 1.7rem; }
  .hero-sub { font-size: .72rem; letter-spacing: 3px; }
  table { min-width: 480px; font-size: .68rem; }
  .section-header { gap: 10px; }
  .section-icon { width: 32px; height: 32px; font-size: .95rem; border-radius: 10px; }
}

/* === NOISE TEXTURE OVERLAY === */
.noise-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* === ANIMATED CARD BORDER GLOW === */
.card::before {
  content: ''; position: absolute; inset: -1px; border-radius: 21px;
  background: linear-gradient(135deg, transparent 40%, rgba(52,211,153,.12) 50%, transparent 60%);
  background-size: 300% 300%;
  z-index: -1; opacity: 0;
  transition: opacity .5s;
}
.card { position: relative; }
.card:hover::before { opacity: 1; animation: borderShimmer 3s ease infinite; }
@keyframes borderShimmer {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

/* === PREMIUM TABLE GLOW === */
.card table { position: relative; }
thead th {
  position: sticky; top: 0; z-index: 2;
  background: rgba(14,16,24,.98) !important;
  backdrop-filter: blur(10px);
}
thead th::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: linear-gradient(90deg, transparent, rgba(52,211,153,.15), transparent);
}
tr:nth-child(even) td { background: rgba(255,255,255,.008); }
tr:hover td { background: rgba(52,211,153,.03) !important; }

/* === STATUS BADGES === */
.sit-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: .62rem; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; white-space: nowrap;
}
.sit-alta-afip { background: rgba(52,211,153,.1); color: #34d399; border: 1px solid rgba(52,211,153,.2); }
.sit-alta-seguro { background: rgba(251,191,36,.1); color: #fbbf24; border: 1px solid rgba(251,191,36,.2); }
.sit-extra { background: rgba(34,211,238,.1); color: #22d3ee; border: 1px solid rgba(34,211,238,.2); }
.sit-baja-afip { background: rgba(248,113,113,.08); color: #f87171; border: 1px solid rgba(248,113,113,.15); }

  100% { background-position: 200% 0; }

let currentTab = 'resumen';

function formatNumber(num) {
  if (num === undefined || num === null) return '0';
  const isNegative = num < 0;
  const absNum = Math.abs(num);
  const str = absNum.toFixed(0);
  const parts = str.split('');
  let result = '';
  for (let i = parts.length - 1; i >= 0; i--) {
    if ((parts.length - 1 - i) % 3 === 0 && i !== parts.length - 1) result = '.' + result;
    result = parts[i] + result;
  }
  return (isNegative ? '-' : '') + '$' + result;
}

function switchTab(tab, event) {
  event?.preventDefault();
  document.querySelectorAll('.tab-pill').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
  event.target.classList.add('active');
  document.getElementById(tab).style.display = 'block';
  currentTab = tab;
  renderTab(tab);
  revealOnScroll();
}

function renderTab(tab) {
  if (tab === 'resumen') {
    const e = reportData.enero, f = reportData.febrero, m = reportData.marzo;
    const totVenta = e.ventaTotal + f.ventaTotal + m.ventaTotal;
    const totCV = e.costoVariable + f.costoVariable + m.costoVariable;
    const totCF = e.costoFijo + f.costoFijo + m.costoFijo;
    const totSueldos = e.sueldos + f.sueldos + m.sueldos;
    const totCMV = e.cmv + f.cmv + m.cmv;
    const totResultado = e.resultado + f.resultado + m.resultado;

    document.getElementById('heroPeriod').textContent = 'Consolidación 2026';
    document.getElementById('heroResult').textContent = (totResultado >= 0 ? '+' : '') + formatNumber(totResultado);
    document.getElementById('heroResult').style.background = totResultado >= 0 ? 'linear-gradient(135deg, #34d399, #6ee7b7)' : 'linear-gradient(135deg, #f87171, #fca5a5)';
    document.getElementById('heroResult').style.webkitBackgroundClip = 'text';
    document.getElementById('heroResult').style.backgroundClip = 'text';
    document.querySelector('.hero-result .tag').textContent = 'Resultado Acumulado';
    document.querySelector('.hero-result').style.borderColor = totResultado >= 0 ? 'rgba(52,211,153,.15)' : 'rgba(248,113,113,.15)';
    document.querySelector('.hero-result').style.background = totResultado >= 0 ? 'linear-gradient(135deg, rgba(52,211,153,.06), rgba(52,211,153,.02))' : 'linear-gradient(135deg, rgba(248,113,113,.06), rgba(248,113,113,.02))';
    document.querySelector('.hero-result').style.boxShadow = totResultado >= 0 ? '0 0 60px rgba(52,211,153,.06), inset 0 1px 0 rgba(255,255,255,.05)' : '0 0 60px rgba(248,113,113,.06), inset 0 1px 0 rgba(255,255,255,.05)';
    document.querySelector('.hero-result .tag').style.color = totResultado >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('heroVs').innerHTML = 'Acumulado Enero - Marzo';
    document.getElementById('resumenContent').innerHTML = renderResumenTab(e, f, m, totVenta, totCV, totCF, totSueldos, totCMV, totResultado);
    setTimeout(() => initializeCharts('resumen', null), 100);
    return;
  }

  const data = reportData[tab];
  if (!data) return;

  document.getElementById('heroPeriod').textContent = data.month;
  document.getElementById('heroResult').textContent = (data.resultado >= 0 ? '+' : '') + formatNumber(data.resultado);
  document.getElementById('heroResult').style.background = data.resultado >= 0 ? 'linear-gradient(135deg, #34d399, #6ee7b7)' : 'linear-gradient(135deg, #f87171, #fca5a5)';
  document.getElementById('heroResult').style.webkitBackgroundClip = 'text';
  document.getElementById('heroResult').style.backgroundClip = 'text';
  document.querySelector('.hero-result .tag').textContent = 'Resultado del mes';
  document.querySelector('.hero-result').style.borderColor = data.resultado >= 0 ? 'rgba(52,211,153,.15)' : 'rgba(248,113,113,.15)';
  document.querySelector('.hero-result').style.background = data.resultado >= 0 ? 'linear-gradient(135deg, rgba(52,211,153,.06), rgba(52,211,153,.02))' : 'linear-gradient(135deg, rgba(248,113,113,.06), rgba(248,113,113,.02))';
  document.querySelector('.hero-result').style.boxShadow = data.resultado >= 0 ? '0 0 60px rgba(52,211,153,.06), inset 0 1px 0 rgba(255,255,255,.05)' : '0 0 60px rgba(248,113,113,.06), inset 0 1px 0 rgba(255,255,255,.05)';
  document.querySelector('.hero-result .tag').style.color = data.resultado >= 0 ? 'var(--green)' : 'var(--red)';

  let heroVsHTML = '';
  const prevTab = tab === 'febrero' ? 'enero' : tab === 'marzo' ? 'febrero' : null;
  const prevData = prevTab ? reportData[prevTab] : null;
  if (prevData) {
    const change = data.resultado - prevData.resultado;
    heroVsHTML = `${prevData.month}: <span class="${prevData.resultado >= 0 ? 'pos' : 'neg'}">${formatNumber(prevData.resultado)}</span> · Cambio: <span class="${change >= 0 ? 'pos' : 'neg'}">${change >= 0 ? '+' : ''}${formatNumber(change)}</span>`;
  } else {
    heroVsHTML = 'Primer mes del período';
  }
  document.getElementById('heroVs').innerHTML = heroVsHTML;

  const container = document.getElementById(tab + 'Content');
  try {
    container.innerHTML = renderMonthContent(tab, data);
  } catch(e) { console.error('Render error for ' + tab + ':', e); container.innerHTML = '<div class="card" style="padding:30px;color:#f87171;">Error al renderizar: ' + e.message + '</div>'; }

  setTimeout(() => initializeCharts(tab, data), 100);
}

function revealOnScroll() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// Initialize on load
window.addEventListener('load', () => {
  renderTab('resumen');
  revealOnScroll();
});

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showWelcomeBanner(user) {
  const banner = document.getElementById('welcomeBanner');
  if (!banner) return;
  const now = new Date();
  const hour = now.getHours();
  let greeting = 'Buenas noches';
  if (hour >= 6 && hour < 13) greeting = 'Buen día';
  else if (hour >= 13 && hour < 20) greeting = 'Buenas tardes';
  banner.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;flex-shrink:0;">
        ${user.name.split(' ').map(n => n[0]).slice(0,2).join('')}
      </div>
      <div>
        <div style="font-size:1rem;font-weight:600;color:#fff;">${greeting}, ${user.name.split(' ')[0]}</div>
        <div style="font-size:.75rem;color:#9ca3af;margin-top:2px;">${user.name} · <span style="color:#34d399;">${user.cargo}</span></div>
      </div>
    </div>
    <button onclick="logout()" style="
      display:flex;align-items:center;gap:6px;
      padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);color:#9ca3af;font-size:.75rem;
      font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;white-space:nowrap;
    " onmouseover="this.style.background='rgba(248,113,113,.1)';this.style.borderColor='rgba(248,113,113,.3)';this.style.color='#f87171'"
       onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.borderColor='rgba(255,255,255,.1)';this.style.color='#9ca3af'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </button>
  `;
  banner.style.display = 'flex';
}

function logout() {
  const banner = document.getElementById('welcomeBanner');
  const main = document.getElementById('mainContent');
  const lock = document.getElementById('lockScreen');
  const pwd = document.getElementById('pwdInput');
  banner.style.display = 'none';
  banner.innerHTML = '';
  main.style.display = 'none';
  lock.style.display = 'flex';
  lock.style.opacity = '1';
  lock.style.transition = 'none';
  pwd.value = '';
  pwd.focus();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

async function checkPwd() {
  const input = document.getElementById('pwdInput').value;
  const hash = await sha256(input);
  const user = USERS.find(u => u.hash === hash);
  if (user) {
    document.getElementById('lockScreen').style.transition = 'opacity .5s';
    document.getElementById('lockScreen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      showWelcomeBanner(user);
      revealOnScroll();
    }, 500);
  } else {
    const err = document.getElementById('pwdError');
    err.style.opacity = '1';
    document.getElementById('pwdInput').style.borderColor = 'rgba(248,113,113,.4)';
    setTimeout(() => { err.style.opacity = '0'; }, 2500);
  }
}

window.addEventListener('load', () => document.getElementById('pwdInput').focus());

// Filter nómina table
function filterNomina(searchId, tbodyId, countId) {
  const query = document.getElementById(searchId).value.toLowerCase().trim();
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr:not(.row-total)');
  let visible = 0;
  rows.forEach(row => {
    const data = row.getAttribute('data-search') || '';
    const match = !query || data.includes(query);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const countEl = document.getElementById(countId);
  if (countEl) countEl.textContent = visible + ' de ' + rows.length;
}

// Scroll to top button
const scrollBtn = document.createElement('div');
scrollBtn.className = 'scroll-top';
scrollBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>';
scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
document.body.appendChild(scrollBtn);
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 400);
});
